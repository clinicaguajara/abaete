[theme]
primaryColor= "rgba(7, 218, 94, 0.9)" # Elementos interativos.
backgroundColor= "#0e1117"  # Fundo escuro.
secondaryBackgroundColor="#161a1f"  # Fundo da sidebar.
textColor="#FFFFFF"  # Texto branco.

[ui]
layout = "wide"  # Expande para ocupar a largura total.

[server]
headless = true
enableCORS = false
enableXsrfProtection = false